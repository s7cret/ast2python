name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          path: ast2python
      - uses: actions/checkout@v4
        with:
          repository: s7cret/pine2ast
          path: pine2ast
      - uses: actions/checkout@v4
        with:
          repository: s7cret/pinelib
          path: pinelib
      - uses: actions/checkout@v4
        with:
          repository: s7cret/marketdata-provider
          path: marketdata-provider
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -e ./marketdata-provider[dev]
          python -m pip install -e ./pinelib[dev]
          python -m pip install -e ./pine2ast[dev]
          python -m pip install -e ./ast2python[dev]
      - name: Ruff lint
        run: python -m ruff check .
        working-directory: ast2python
      - name: Black format check
        run: python -m black --check . --workers 1
        working-directory: ast2python
      - name: MyPy type check
        run: python -m mypy ast2python
        working-directory: ast2python
      - name: Unit tests
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 python -m pytest tests/unit/ -v --tb=short
        working-directory: ast2python
      - name: Integration tests (non-E2E)
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 python -m pytest tests/integration/ -v --tb=short -k "not cross_project"
        working-directory: ast2python
        env:
          PINE_STACK_ROOT: ${{ github.workspace }}
      - name: Coverage gate
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 python -m pytest -q -p pytest_cov --cache-clear tests/unit tests/integration --cov=ast2python --cov-report=term
        working-directory: ast2python
        env:
          PINE_STACK_ROOT: ${{ github.workspace }}
      - name: Release checks
        run: |
          python -m ast2python.quality duplicates ast2python
          python -m ast2python.quality architecture ast2python --max-lines 700
          python -m ast2python.lowering_matrix.validate
          python -m ast2python.distribution manifest --root .
          python -m ast2python.release --root .
        working-directory: ast2python
      - name: Wheel install smoke test
        run: |
          python -m build
          python -m venv /tmp/wheel-test
          /tmp/wheel-test/bin/pip install dist/*.whl --no-deps
          /tmp/wheel-test/bin/python -c "import ast2python; import ast2python.translator; from ast2python.translator_mixins.metadata import *; print('wheel OK')"
        working-directory: ast2python
